<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tập Chủ nghĩa xã hội khoa học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) { transform: translateX(5px); }
        .correct { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-2">
            <div id="progress-bar" class="bg-blue-600 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-6 md:p-8">
            <!-- Header Info -->
            <div class="flex justify-between items-center mb-6">
                <span class="text-sm font-semibold text-blue-600 uppercase tracking-wider">Môn học: CNXHKH</span>
                <span id="question-counter" class="text-sm text-gray-500 font-medium">Câu 1/50</span>
            </div>

            <!-- Question Area -->
            <div id="quiz-container">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-tight">
                    Đang tải câu hỏi...
                </h2>

                <div id="options-container" class="space-y-3">
                    <!-- Options will be injected here -->
                </div>

                <!-- Feedback Area -->
                <div id="feedback" class="mt-8 p-4 rounded-xl hidden">
                    <p id="feedback-text" class="font-bold"></p>
                    <p id="explanation-text" class="text-sm mt-2 opacity-90"></p>
                </div>

                <!-- Navigation -->
                <div class="mt-8 flex justify-end">
                    <button id="next-btn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors">
                        Câu tiếp theo →
                    </button>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="result-screen" class="hidden text-center py-10">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">Hoàn thành bài luyện tập!</h2>
                <p id="final-score" class="text-xl text-gray-600 mb-8"></p>
                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors">
                    Luyện tập lại
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
  {
    "q": "Theo Ph.Ăngghen, trong giai đoạn đầu của xã hội cộng sản chủ nghĩa, chủ nghĩa xã hội có thể thủ tiêu chế độ tư hữu ngay lập tức hay không?",
    "options": [
      "Có thể ngay lập tức nếu giai cấp vô sản nắm vững chính quyền cách mạng.",
      "Có thể ngay lập tức nếu có sự hỗ trợ vật chất từ các quốc gia tiên tiến khác.",
      "Không thể ngay lập tức xóa bỏ mà phải cải tạo từng bước theo sự phát triển của lực lượng sản xuất.",
      "Có nhiều điều kiện thuận lợi để xóa bỏ hoàn toàn ngay khi cuộc cách mạng vô sản giành thắng lợi."
    ],
    "a": 2,
    "e": "Ph.Ăngghen khẳng định không thể xóa bỏ ngay lập tức chế độ tư hữu mà phải cải tạo từng bước phù hợp với trình độ phát triển của lực lượng sản xuất."
  },
  {
    "q": "Đặc trưng nào dưới đây được xem là tiêu chí cơ bản nhất và phân biệt rõ rệt nhất của một Dân tộc - Quốc gia?",
    "options": [
      "Có chung một phương thức sinh hoạt kinh tế và thị trường thống nhất.",
      "Có nét văn hóa truyền thống riêng biệt lâu đời.",
      "Có lãnh thổ chung ổn định không bị chia cắt, có sự quản lý thống nhất của một Nhà nước.",
      "Có một ngôn ngữ chung được toàn bộ cư dân sử dụng."
    ],
    "a": 2,
    "e": "Lãnh thổ chung ổn định đi kèm chủ quyền chính trị của một Nhà nước là tiêu chí pháp lý tối cao phân biệt các quốc gia độc lập."
  },
  {
    "q": "Trong việc xây dựng khối liên minh giữa giai cấp công nhân với giai cấp nông dân và các tầng lớp nhân dân lao động khác, nội dung liên minh nào giữ vai trò quyết định và quan trọng nhất?",
    "options": [
      "Liên minh về mặt văn hóa - tư tưởng nhằm xây dựng hệ tư tưởng mới tiên tiến.",
      "Liên minh về mặt kinh tế nhằm thỏa mãn lợi ích vật chất và tạo cơ sở vật chất kỹ thuật cho chủ nghĩa xã hội.",
      "Liên minh về mặt chính trị nhằm giữ vững vai trò lãnh đạo của giai cấp công nhân.",
      "Liên minh về mặt xã hội nhằm giải quyết các vấn đề bình đẳng giới và dân cư."
    ],
    "a": 1,
    "e": "Liên minh kinh tế đáp ứng nhu cầu lợi ích vật chất khách quan, là nền tảng quyết định tính bền vững lâu dài của khối liên minh."
  },
  {
    "q": "Theo nội dung cơ bản của dân chủ trong lĩnh vực kinh tế ở Việt Nam, nhận định nào dưới đây là SAI?",
    "options": [
      "Mọi công dân đều bình đẳng và tự do kinh doanh trong khuôn khổ pháp luật.",
      "Mọi công dân được quyền sản xuất, kinh doanh tự do kể cả những mặt hàng nhà nước cấm vì mục tiêu lợi nhuận.",
      "Mọi công dân đều bình đẳng trước pháp luật và tự do lựa chọn ngành nghề phù hợp với năng lực.",
      "Mọi công dân đều bình đẳng và tự do kinh doanh đồng thời phải thực hiện nghĩa vụ đóng thuế theo quy định."
    ],
    "a": 1,
    "e": "Quyền tự do kinh doanh của công dân luôn có giới hạn và phải tuân thủ pháp luật, tuyệt đối không được sản xuất mặt hàng cấm."
  },
  {
    "q": "Về mặt bản chất kinh tế - xã hội, thực chất của quan hệ liên minh giữa công nhân, nông dân và trí thức trong thời kỳ quá độ là gì?",
    "options": [
      "Sự kết hợp chặt chẽ trên phương diện thống nhất tư tưởng cách mạng tuyệt đối.",
      "Sự giao thoa và hòa nhập toàn diện giữa các hình thái văn hóa vùng miền.",
      "Quan hệ kinh tế - xã hội xuất phát từ sự gắn kết lợi ích vật chất và nhu cầu phát triển sản xuất.",
      "Sự phân chia quyền lực chính trị cơ học độc lập giữa các tầng lớp trong bộ máy chính phủ."
    ],
    "a": 2,
    "e": "Bản chất liên minh bắt nguồn sâu xa từ nhu cầu kinh tế, sự gắn kết lợi ích vật chất giữa các lực lượng trong nền sản xuất xã hội."
  },
  {
    "q": "Tác phẩm nào chứa đựng luận điểm nổi tiếng của Ph.Ăngghen: 'Tất cả mọi tôn giáo chẳng qua chỉ là sự phản ảnh hư ảo vào trong đầu óc của con người...'?",
    "options": [
      "Tuyên ngôn của Đảng Cộng sản",
      "Gia đình thần thánh",
      "Chống Đuyrinh",
      "Phê phán cương lĩnh Gôta"
    ],
    "a": 2,
    "e": "Định nghĩa về bản chất xã hội và nguồn gốc nhận thức của tôn giáo được Ăngghen luận giải khoa học trong tác phẩm Chống Đuyrinh (1878)."
  },
  {
    "q": "Mâu thuẫn kinh tế cơ bản và sâu xa của phương thức sản xuất tư bản chủ nghĩa là mâu thuẫn giữa những yếu tố nào?",
    "options": [
      "Mâu thuẫn thuần túy về mặt ý thức giữa giai cấp tư sản và giai cấp công nhân.",
      "Mâu thuẫn giữa lực lượng sản xuất đã lỗi thời với quan hệ sản xuất tiên tiến vượt trước thời đại.",
      "Mâu thuẫn giữa tính chất xã hội hóa ngày càng cao của lực lượng sản xuất với chế độ chiếm hữu tư nhân tư bản chủ nghĩa về tư liệu sản xuất.",
      "Mâu thuẫn giữa tính chất cá nhân hóa của lực lượng sản xuất với chế độ công hữu toàn dân."
    ],
    "a": 2,
    "e": "Đây là mâu thuẫn cơ bản của CNTB, biểu hiện xã hội của nó chính là mâu thuẫn giai cấp giữa tư sản và vô sản."
  },
  {
    "q": "Trong các chức năng của Nhà nước xã hội chủ nghĩa, chức năng nào được xem là căn bản nhất, đồng thời cũng là chức năng khó khăn và phức tạp nhất?",
    "options": [
      "Chức năng tổ chức quản lý và xây dựng kinh tế xã hội.",
      "Chức năng trấn áp bằng bạo lực các thế lực thù địch chống phá chính quyền.",
      "Chức năng quản lý hành chính đơn thuần và ký kết ngoại giao quốc tế.",
      "Chức năng giữ gìn an ninh trật tự công cộng xã hội ổn định."
    ],
    "a": 0,
    "e": "Xây dựng phương thức sản xuất mới tiên tiến nhằm giải phóng sức sản xuất là nhiệm vụ trung tâm, gian khổ nhất của nhà nước XHCN."
  },
  {
    "q": "Nhận định sau đây đúng hay sai: 'Các thành viên của một gia đình bắt buộc phải sống chung trong một không gian xác định'?",
    "options": [
      "Đúng.",
      "Sai.",
      "Đúng nhưng không hoàn toàn.",
      "Sai nhưng không hoàn toàn."
    ],
    "a": 1,
    "e": "Sai, vì mối quan hệ gia đình được duy trì bằng nghĩa vụ pháp lý, tình cảm và huyết thống, không bị triệt tiêu bởi khoảng cách địa lý."
  },
  {
    "q": "So với giai cấp công nhân ở thế kỷ XIX tại các nước tư bản chủ nghĩa, giai cấp công nhân hiện nay có điểm tương đồng nào về nội dung chính trị - xã hội?",
    "options": [
      "Xây dựng nhà nước nhằm quản lý mọi mặt của đời sống xã hội.",
      "Cũng có mục tiêu lâu dài là giành chính quyền về tay giai cấp công nhân và nhân dân lao động.",
      "Hoàn thiện các yếu tố trong kiến trúc thượng tầng, nhất là chính Đảng.",
      "Xây dựng kiến trúc thượng tầng, dựa trên cơ sở hạ tầng của xã hội."
    ],
    "a": 1,
    "e": "Bản chất chính trị xuyên suốt của phong trào công nhân qua các thế kỷ vẫn là đấu tranh giành chính quyền hướng tới xóa bỏ áp bức."
  },
  {
    "q": "Căn cứ vào tính chất của quyền lực nhà nước, chức năng của nhà nước được chia thành các loại hình nào?",
    "options": [
      "Chức năng giai cấp (trấn áp) và chức năng xã hội (xây dựng).",
      "Chức năng đối nội và chức năng đối ngoại.",
      "Chức năng chính trị và chức năng kinh tế.",
      "Chức năng hành chính và chức năng tư pháp."
    ],
    "a": 0,
    "e": "Tính chất quyền lực nhà nước luôn thể hiện tính giai cấp (chuyên chính) song hành cùng tính xã hội (quản lý công cộng)."
  },
  {
    "q": "Chọn câu trả lời KHÔNG chính xác về các nhiệm vụ thuộc nội dung liên minh về mặt văn hóa - xã hội?",
    "options": [
      "Phát triển nền kinh tế nhiều thành phần.",
      "Nâng cao chất lượng nguồn nhân lực, xóa đói giảm nghèo.",
      "Nâng cao dân trí, phát triển con người toàn diện.",
      "Gắn tăng trưởng kinh tế với phát triển văn hóa, thực hiện công bằng xã hội."
    ],
    "a": 0,
    "e": "Nhiệm vụ 'phát triển nền kinh tế nhiều thành phần' thuộc nội dung liên minh kinh tế, không thuộc nội dung văn hóa - xã hội."
  },
  {
    "q": "Giai đoạn cao của hình thái kinh tế - xã hội cộng sản chủ nghĩa được gọi là gì?",
    "options": [
      "Thời kỳ quá độ.",
      "Xã hội chủ nghĩa.",
      "Cộng sản chủ nghĩa.",
      "Nền kinh tế thị trường định hướng XHCN."
    ],
    "a": 2,
    "e": "Hình thái cộng sản chủ nghĩa gồm giai đoạn thấp là XHCN và giai đoạn cao là xã hội Cộng sản chủ nghĩa."
  },
  {
    "q": "Chọn phương án SAI khi nói về các biểu hiện cụ thể trong chính sách đại đoàn kết tôn giáo, dân tộc của nước ta?",
    "options": [
      "Nghiêm cấm mọi hành vi chia rẽ, phân biệt đối xử vì lý do tín ngưỡng, tôn giáo.",
      "Khuyến khích các hoạt động tôn giáo mang tính chất tâm linh cực đoan, mê tín dị đoan.",
      "Mọi công dân không phân biệt tín ngưỡng đều có quyền và nghĩa vụ bảo vệ Tổ quốc.",
      "Vận động quần chúng tham gia sản xuất, nâng cao đời sống để tăng cường đoàn kết."
    ],
    "a": 1,
    "e": "Đảng và Nhà nước kiên quyết bài trừ mê tín dị đoan và các hành vi tôn giáo cực đoan xâm hại đến trật tự, lợi ích chung."
  },
  {
    "q": "Nền dân chủ xã hội chủ nghĩa xét về bản chất xã hội là nền dân chủ đại diện cho ai?",
    "options": [
      "Của riêng giai cấp công nhân.",
      "Của toàn thể nhân dân lao động.",
      "Của đội ngũ những người lãnh đạo bộ máy chính trị.",
      "Của các tầng lớp trung lưu tư sản dân tộc."
    ],
    "a": 1,
    "e": "Dân chủ XHCN là nền dân chủ rộng rãi nhất trong lịch sử, đặt quyền lực vào tay đa số quần chúng lao động."
  },
  {
    "q": "Khẳng định nào dưới đây phản ánh chính xác nhất quyền dân chủ của công dân trong lĩnh vực chính trị?",
    "options": [
      "Công dân có quyền quyết định số lượng thành viên tối đa của Chính phủ.",
      "Công dân có quyền quyết định mọi quyết sách ngoại giao quốc tế tức thời.",
      "Công dân có quyền bầu cử, ứng cử vào các cơ quan quyền lực nhà nước.",
      "Công dân có quyền tự do bãi miễn bất kỳ công chức nào mà không cần xét xử."
    ],
    "a": 2,
    "e": "Quyền bầu cử, ứng cử là quyền dân chủ chính trị cơ bản nhất thể hiện trực tiếp tư cách chủ nhân đất nước của công dân."
  },
  {
    "q": "Điền vào chỗ trống luận điểm của Lênin: 'Chuyên chính vô sản là một hình thức đặc biệt của liên minh giai cấp giữa... - đội tiền phong của người lao động, với đông đảo tầng lớp không phải vô sản...'",
    "options": [
      "Giai cấp vô sản (hoặc giai cấp công nhân).",
      "Giai cấp nông dân.",
      "Tầng lớp trí thức.",
      "Giai cấp tư sản dân tộc."
    ],
    "a": 0,
    "e": "Theo Lênin, nòng cốt điều hành bộ máy chuyên chính vô sản chính là giai cấp vô sản thông qua chính đảng của mình."
  },
  {
    "q": "Trong tiến trình lịch sử xã hội, tác động của thiết chế gia đình đối với sự phát triển của xã hội biến đổi như thế nào?",
    "options": [
      "Hoàn toàn giống nhau qua mọi thời kỳ.",
      "Không hoàn toàn giống nhau, phụ thuộc vào điều kiện kinh tế - xã hội của mỗi giai đoạn.",
      "Độc lập hoàn toàn, không chịu tác động lịch sử.",
      "Tác động giảm dần tiến tới triệt tiêu hoàn toàn."
    ],
    "a": 1,
    "e": "Gia đình là tế bào xã hội, chức năng và cấu trúc của nó biến đổi biện chứng dựa theo cơ sở kinh tế của từng thời kỳ lịch sử."
  },
  {

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionCounter = document.getElementById('question-counter');
        const progressBar = document.getElementById('progress-bar');
        const nextBtn = document.getElementById('next-btn');
        const feedbackArea = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const explanationText = document.getElementById('explanation-text');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');

        function loadQuestion() {
            isAnswered = false;
            const currentQuestion = questions[currentQuestionIndex];
            
            // Update Progress
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            questionCounter.innerText = `Câu ${currentQuestionIndex + 1}/${questions.length}`;
            
            // Set Question Text
            questionText.innerText = currentQuestion.q;
            questionText.classList.remove('fade-in');
            void questionText.offsetWidth; // Trigger reflow
            questionText.classList.add('fade-in');

            // Clear and Load Options
            optionsContainer.innerHTML = '';
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 font-medium text-gray-700 hover:border-blue-400 hover:bg-blue-50 focus:outline-none';
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            // Reset UI
            feedbackArea.classList.add('hidden');
            nextBtn.classList.add('hidden');
        }

        function selectOption(index) {
            if (isAnswered) return;
            isAnswered = true;

            const currentQuestion = questions[currentQuestionIndex];
            const buttons = optionsContainer.getElementsByTagName('button');

            if (index === currentQuestion.a) {
                // Correct
                buttons[index].classList.add('correct');
                score++;
                showFeedback(true, currentQuestion.e);
            } else {
                // Wrong
                buttons[index].classList.add('wrong');
                buttons[currentQuestion.a].classList.add('correct'); // Highlight right answer
                showFeedback(false, currentQuestion.e);
            }

            // Disable all buttons
            for (let btn of buttons) {
                btn.disabled = true;
                if (!btn.classList.contains('correct') && !btn.classList.contains('wrong')) {
                    btn.classList.add('opacity-50');
                }
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function showFeedback(isCorrect, explanation) {
            feedbackArea.classList.remove('hidden');
            feedbackArea.classList.add('fade-in');
            
            if (isCorrect) {
                feedbackArea.className = 'mt-8 p-4 rounded-xl bg-green-100 text-green-800 border border-green-200 fade-in';
                feedbackText.innerText = 'Chính xác! 🌟';
            } else {
                feedbackArea.className = 'mt-8 p-4 rounded-xl bg-red-100 text-red-800 border border-red-200 fade-in';
                feedbackText.innerText = 'Rất tiếc, chưa đúng rồi...';
            }
            explanationText.innerText = explanation;
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizContainer.classList.add('hidden');
            progressBar.style.width = '100%';
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('fade-in');
            
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            if (percentage >= 80) message = "Xuất sắc! Bạn đã nắm rất vững kiến thức.";
            else if (percentage >= 50) message = "Khá tốt! Hãy ôn luyện thêm một chút nữa nhé.";
            else message = "Bạn cần cố gắng thêm nhiều. Đừng bỏ cuộc!";

            finalScore.innerHTML = `Bạn trả lời đúng <strong>${score}/${questions.length}</strong> câu.<br><span class="text-sm">${message}</span>`;
        }

        // Start the quiz
        window.onload = loadQuestion;

    </script>
</body>
</html>
