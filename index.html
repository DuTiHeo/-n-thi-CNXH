<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tập Chủ nghĩa xã hội khoa học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) { transform: translateX(5px); }
        .correct { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-2">
            <div id="progress-bar" class="bg-blue-600 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-6 md:p-8">
            <!-- Header Info -->
            <div class="flex justify-between items-center mb-6">
                <span class="text-sm font-semibold text-blue-600 uppercase tracking-wider">Môn học: CNXHKH</span>
                <span id="question-counter" class="text-sm text-gray-500 font-medium">Câu 1/50</span>
            </div>

            <!-- Question Area -->
            <div id="quiz-container">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-tight">
                    Đang tải câu hỏi...
                </h2>

                <div id="options-container" class="space-y-3">
                    <!-- Options will be injected here -->
                </div>

                <!-- Feedback Area -->
                <div id="feedback" class="mt-8 p-4 rounded-xl hidden">
                    <p id="feedback-text" class="font-bold"></p>
                    <p id="explanation-text" class="text-sm mt-2 opacity-90"></p>
                </div>

                <!-- Navigation -->
                <div class="mt-8 flex justify-end">
                    <button id="next-btn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors">
                        Câu tiếp theo →
                    </button>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="result-screen" class="hidden text-center py-10">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">Hoàn thành bài luyện tập!</h2>
                <p id="final-score" class="text-xl text-gray-600 mb-8"></p>
                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors">
                    Luyện tập lại
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
  {
    "q": "Theo chủ nghĩa Mác - Lênin, chủ nghĩa xã hội được hiểu là một hình thái xã hội có vị trí lịch sử như thế nào?",
    "options": [
      "Là giai đoạn sau cùng hoàn thiện của hình thái kinh tế - xã hội cộng sản.",
      "Là một thời kỳ cải biến cách mạng độc lập hoàn toàn với hình thái cộng sản.",
      "Là giai đoạn đầu thấp của hình thái kinh tế - xã hội cộng sản chủ nghĩa.",
      "Là bước chuẩn bị tiền đề nằm hoàn toàn bên ngoài hình thái cộng sản."
    ],
    "a": 2,
    "e": "Theo lý luận hình thái xã hội, Chủ nghĩa xã hội là giai đoạn đầu (thấp) của hình thái kinh tế - xã hội Cộng sản chủ nghĩa, trước khi tiến lên giai đoạn cao."
  },
  {
    "q": "Thực trạng xã hội tác động thông qua lăng kính gia đình sẽ ảnh hưởng trực tiếp đến sự phát triển của mỗi cá nhân về phương diện nào đầu tiên?",
    "options": [
      "Năng lực quản lý tài chính và các kỹ năng đầu tư kinh doanh doanh nghiệp.",
      "Đạo đức và nhân cách lối sống cùng thế giới quan ứng xử xã hội.",
      "Địa vị chính trị chính thức hiến định trong bộ máy hành chính nhà nước.",
      "Trình độ sử dụng công nghệ tự động hóa và các kỹ năng tin học văn phòng."
    ],
    "a": 1,
    "e": "Gia đình thực hiện chức năng giáo dục xã hội hóa, là lăng kính đầu tiên định hình đạo đức, lối sống và nhân cách ban đầu cho mỗi thành viên xã hội."
  },
  {
    "q": "Muốn thực hiện quyền bình đẳng giữa các dân tộc trong một quốc gia đa tộc người thì nhiệm vụ cốt lõi cần làm là gì?",
    "options": [
      "Xóa bỏ khoảng cách phát triển toàn diện cả về kinh tế, văn hóa và xã hội.",
      "Chỉ tập trung phát triển các nghi lễ tôn giáo tín ngưỡng dân gian vùng miền.",
      "Đồng hóa toàn bộ các hệ ngôn ngữ của các tộc người thiểu số thành một thứ.",
      "Tách biệt hoàn toàn các vùng cư trú hành chính của các dân tộc biệt lập."
    ],
    "a": 0,
    "e": "Bình đẳng dân tộc không chỉ là khẩu hiệu pháp lý mà phải hiện thực hóa bằng cách thu hẹp và xóa bỏ khoảng cách phát triển toàn diện giữa các tộc người."
  },
  {
    "q": "Khái niệm nào dùng để chỉ một cộng đồng người ổn định được hình thành trên cơ sở một lãnh thổ, ngôn ngữ và nền kinh tế thống nhất?",
    "options": [
      "Hình thái cộng đồng thị tộc nguyên thủy.",
      "Hình thái cộng đồng bộ lạc liên minh.",
      "Hình thái cộng đồng bộ tộc phong kiến.",
      "Hình thái cộng đồng dân tộc quốc gia."
    ],
    "a": 3,
    "e": "Đây là định nghĩa kinh điển về mô hình Dân tộc (với tư cách Dân tộc - Quốc gia) phát triển hoàn chỉnh nhất trong lịch sử tiến hóa của nhân loại."
  },
  {
    "q": "Về mặt chính trị, sự thống trị của giai cấp tư sản trong xã hội tư bản chủ nghĩa thực chất là sự chuyên chính của lực lượng nào?",
    "options": [
      "Sự thống trị độc quyền của thiểu số bóc lột với đa số nhân dân lao động.",
      "Sự thống trị dân chủ của đại đa số quần chúng lao động với thiểu số bóc lột.",
      "Sự quản lý hành chính trung lập của đội ngũ công chức nhà nước chuyên nghiệp.",
      "Sự phối hợp điều hành đồng đều quyền lực giữa tư sản và giai cấp công nhân."
    ],
    "a": 0,
    "e": "Nhà nước tư sản về bản chất chính trị là công cụ chuyên chính thống trị độc quyền của thiểu số giai cấp tư sản đối với đa số quần chúng lao động."
  },
  {
    "q": "Nhân tố chủ quan nào giữ vai trò quyết định nhất để giai cấp công nhân hoàn thành sứ mệnh lịch sử của mình?",
    "options": [
      "Sự sa sút kinh tế tuyệt đối của các tập đoàn tư sản độc quyền toàn cầu.",
      "Sự gia tăng tự phát của dòng người di cư từ nông thôn vào các đô thị lớn.",
      "Sự thành lập và lãnh đạo của Đảng Cộng sản - Chính đảng vô sản cách mạng.",
      "Sự viện trợ vũ khí thô sơ từ các phong trào đấu tranh của các nước láng giềng."
    ],
    "a": 2,
    "e": "Đảng Cộng sản là nhân tố chủ quan cao nhất, đem lại hệ tư tưởng khoa học và tính tổ chức kỷ luật để dẫn dắt phong trào công nhân đi đến thắng lợi."
  },
  {
    "q": "Sự đan xen, kế thừa và đấu tranh giữa các yếu tố cũ và mới là đặc điểm nổi bật của lĩnh vực nào trong thời kỳ quá độ lên chủ nghĩa xã hội?",
    "options": [
      "Chỉ xuất hiện đơn thuần trong lĩnh vực tư tưởng và đời sống tinh thần.",
      "Chỉ xuất hiện đơn thuần trong lĩnh vực sản xuất nông nghiệp nông thôn.",
      "Diễn ra trên tất cả các lĩnh vực kinh tế, chính trị, văn hóa và xã hội.",
      "Chỉ xuất hiện trong kết cấu phân bổ mật độ dân cư tộc người quốc gia."
    ],
    "a": 2,
    "e": "Thời kỳ quá độ là một thực thể xã hội phức tạp, sự đan xen đấu tranh cũ - mới diễn ra toàn diện trên tất cả mọi khía cạnh của đời sống xã hội."
  },
  {
    "q": "Khẩu hiệu chiến lược nổi tiếng nào trong 'Tuyên ngôn của Đảng Cộng sản' thể hiện tính chất quốc tế của sứ mệnh lịch sử giai cấp công nhân?",
    "options": [
      "Nhân dân tất cả các nước độc lập tự trị, tự lực tự cường đứng lên!",
      "Vô sản tất cả các nước, đoàn kết lại! (Lời kêu gọi lịch sử của C.Mác)",
      "Bình đẳng, tự do, bác ái cho mọi giai cấp tầng lớp trong xã hội mới!",
      "Xóa bỏ nhà nước hành chính ngay lập tức trong cuộc khởi nghĩa vũ trang!"
    ],
    "a": 1,
    "e": "Lời kêu gọi 'Vô sản tất cả các nước, đoàn kết lại!' khẳng định bản chất quốc tế và sự thống nhất hành động của phong trào vô sản toàn cầu."
  },
  {
    "q": "Đặc trưng kinh tế của xã hội xã hội chủ nghĩa mà nhân dân ta đang xây dựng có quan hệ sản xuất dựa trên nền tảng nào?",
    "options": [
      "Dựa trên nền kinh tế phát triển cao với lực lượng hiện đại và quan hệ phù hợp.",
      "Dựa trên chế độ tư hữu độc quyền của các tập đoàn kinh tế tư bản nước ngoài.",
      "Dựa trên sự cào bằng tuyệt đối mọi nguồn thu nhập vật chất kinh tế cơ học.",
      "Quay trở lại nền kinh tế tự cấp tự túc đóng kín thời kỳ công xã sơ khai."
    ],
    "a": 0,
    "e": "Văn kiện Cương lĩnh phát triển đất nước xác định quan hệ sản xuất phải tiến bộ, phù hợp nhằm giải phóng tối đa sức sản xuất của nền đại công nghiệp."
  },
  {
    "q": "Quyền dân tộc tự quyết bao gồm những nội dung chính trị tối cao nào dưới đây?",
    "options": [
      "Quyền tự do phân lập thành nước độc lập và quyền tự nguyện liên hiệp bình đẳng.",
      "Quyền được đơn phương gây chiến tranh biên giới đối ngoại với các quốc gia khác.",
      "Quyền trục xuất toàn bộ các tộc người thiểu số ra khỏi ranh giới hành chính quốc gia.",
      "Quyền từ chối tham gia vào tất cả các tổ chức kinh tế và hiệp ước quốc tế."
    ],
    "a": 0,
    "e": "Tự quyết dân tộc mang hai mặt biện chứng: tự do tách ra lập quốc hoặc tự nguyện liên kết hợp tác bình đẳng, không chịu sự cưỡng bức phe phái."
  },
  {
    "q": "Theo lý luận Mác - Lênin, tôn giáo sẽ mất đi vị thế ảnh hưởng và tiêu vong khi nào?",
    "options": [
      "Khi nhà nước sử dụng mệnh lệnh hành chính để cấm đoán các hoạt động thờ tự.",
      "Khi tất cả mọi người dân trong xã hội đều đạt trình độ học vấn từ thạc sĩ.",
      "Khi các điều kiện nguồn gốc kinh tế, xã hội và nhận thức được giải quyết triệt để.",
      "Khi có sự xuất hiện của một hình thái tôn giáo mới hiện đại mang tính toàn cầu."
    ],
    "a": 2,
    "e": "Tôn giáo là hình thái ý thức xã hội phản ánh tồn tại xã hội, nó chỉ biến mất khi những điều kiện vật chất kinh tế - xã hội sản sinh ra nó bị triệt tiêu."
  },
  {
    "q": "Mối quan hệ giữa dân tộc và tôn giáo ở Việt Nam mang đặc điểm nổi bật nào cần chú ý trong đường lối chiến lược?",
    "options": [
      "Tách rời độc lập tuyệt đối, không có sự liên quan can dự nào về văn hóa xã hội.",
      "Các tôn giáo lớn đều phân bổ độc quyền theo ranh giới địa lý của từng tộc người.",
      "Các dân tộc thiểu số hoàn toàn từ chối tham gia các sinh hoạt tôn giáo tín ngưỡng.",
      "Mối quan hệ gắn kết chặt chẽ, các tộc người đều có đức tin tín ngưỡng đan xen."
    ],
    "a": 3,
    "e": "Ở Việt Nam, tôn giáo và dân tộc luôn gắn kết, một tộc người có thể theo nhiều tôn giáo và ngược lại, tạo nên sự phong phú trong đời sống tâm linh."
  },
  {
    "q": "Hình thức hôn nhân đặc trưng và tiến bộ nhất cấu thành nên gia đình trong thời kỳ quá độ lên chủ nghĩa xã hội là gì?",
    "options": [
      "Hôn nhân đa thê gia trưởng truyền thống dựa trên sự phục tùng của người phụ nữ.",
      "Hôn nhân tự do tự nguyện, một vợ một chồng, bình đẳng toàn diện trước pháp luật.",
      "Hôn nhân sắp đặt cơ học vì mục tiêu liên minh khối tài sản giữa hai dòng tộc lớn.",
      "Hôn nhân tập thể quần hôn thô sơ thời kỳ công xã nguyên thủy mẫu hệ xa xưa."
    ],
    "a": 1,
    "e": "Chế độ hôn nhân mới tiến bộ đòi hỏi sự tự nguyện tình cảm, một vợ một chồng ổn định và sự bình đẳng trách nhiệm giữa người vợ và người chồng."
  },
  {
    "q": "In thời kỳ quá độ lên chủ nghĩa xã hội, chức năng tổ chức kinh tế của gia đình có xu hướng thay đổi như thế nào?",
    "options": [
      "Biến mất hoàn toàn, gia đình không còn bất kỳ vai trò kinh tế tiêu dùng nào.",
      "Dịch chuyển từ đơn vị tự cung tự cấp sang đơn vị tiêu dùng và kết nối thị trường.",
      "Trở thành đơn vị độc quyền sở hữu và định đoạt toàn bộ đất đai của quốc gia.",
      "Quay lại mô hình sở hữu nô lệ trực tiếp trong các hoạt động sản xuất tại gia."
    ],
    "a": 1,
    "e": "Gia đình hiện đại không còn là công xưởng sản xuất biệt lập, mà chuyển dịch mạnh sang chức năng tổ chức tiêu dùng và tham gia vào chuỗi cung ứng xã hội."
  },
  {
    "q": "Bản chất chính trị của nền dân chủ xã hội chủ nghĩa được định nghĩa là quyền lực thuộc về lực lượng nào?",
    "options": [
      "Quyền lực thuộc về các chuyên gia tư vấn kỹ thuật và các tổ chức quốc tế.",
      "Quyền lực thuộc về người đứng đầu cơ quan lập pháp cao nhất nắm quyền định đoạt.",
      "Quyền lực tối cao thuộc về nhân dân lao động dưới sự lãnh đạo của Đảng Cộng sản.",
      "Quyền lực thuộc về các tổ chức phi chính phủ và các hiệp hội thương mại độc lập."
    ],
    "a": 2,
    "e": "Bản chất chính trị cốt lõi của nền dân chủ mới là khẳng định nhân dân lao động chính là chủ thể đích thực nắm giữ và thực thi mọi quyền lực nhà nước."
  },
  {
    "q": "Nhà nước pháp quyền xã hội chủ nghĩa quản lý xã hội chủ yếu bằng công cụ tối cao nào?",
    "options": [
      "Hệ thống các tín điều và giáo luật tôn giáo thần bí truyền từ đời này sang đời khác.",
      "Hệ thống Hiến pháp và pháp luật nghiêm minh, khoa học (Thượng tôn pháp luật xã hội).",
      "Các mệnh lệnh truyền miệng trực tiếp từ thủ trưởng cơ quan quản lý hành chính nhà nước.",
      "Các phong tục tập quán thô sơ vùng miền và hương ước làng xã thời phong kiến cũ."
    ],
    "a": 1,
    "e": "Tính pháp quyền đòi hỏi Nhà nước phải quản lý điều hành mọi mặt đời sống bằng Hiến pháp và hệ thống luật pháp thống nhất, loại bỏ sự độc đoán cá nhân."
  },
  {
    "q": "Nguyên nhân sâu xa quyết định sự xuất hiện của các giai cấp đối kháng trong lịch sử xã hội loài người là gì?",

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionCounter = document.getElementById('question-counter');
        const progressBar = document.getElementById('progress-bar');
        const nextBtn = document.getElementById('next-btn');
        const feedbackArea = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const explanationText = document.getElementById('explanation-text');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');

        function loadQuestion() {
            isAnswered = false;
            const currentQuestion = questions[currentQuestionIndex];
            
            // Update Progress
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            questionCounter.innerText = `Câu ${currentQuestionIndex + 1}/${questions.length}`;
            
            // Set Question Text
            questionText.innerText = currentQuestion.q;
            questionText.classList.remove('fade-in');
            void questionText.offsetWidth; // Trigger reflow
            questionText.classList.add('fade-in');

            // Clear and Load Options
            optionsContainer.innerHTML = '';
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 font-medium text-gray-700 hover:border-blue-400 hover:bg-blue-50 focus:outline-none';
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            // Reset UI
            feedbackArea.classList.add('hidden');
            nextBtn.classList.add('hidden');
        }

        function selectOption(index) {
            if (isAnswered) return;
            isAnswered = true;

            const currentQuestion = questions[currentQuestionIndex];
            const buttons = optionsContainer.getElementsByTagName('button');

            if (index === currentQuestion.a) {
                // Correct
                buttons[index].classList.add('correct');
                score++;
                showFeedback(true, currentQuestion.e);
            } else {
                // Wrong
                buttons[index].classList.add('wrong');
                buttons[currentQuestion.a].classList.add('correct'); // Highlight right answer
                showFeedback(false, currentQuestion.e);
            }

            // Disable all buttons
            for (let btn of buttons) {
                btn.disabled = true;
                if (!btn.classList.contains('correct') && !btn.classList.contains('wrong')) {
                    btn.classList.add('opacity-50');
                }
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function showFeedback(isCorrect, explanation) {
            feedbackArea.classList.remove('hidden');
            feedbackArea.classList.add('fade-in');
            
            if (isCorrect) {
                feedbackArea.className = 'mt-8 p-4 rounded-xl bg-green-100 text-green-800 border border-green-200 fade-in';
                feedbackText.innerText = 'Chính xác! 🌟';
            } else {
                feedbackArea.className = 'mt-8 p-4 rounded-xl bg-red-100 text-red-800 border border-red-200 fade-in';
                feedbackText.innerText = 'Rất tiếc, chưa đúng rồi...';
            }
            explanationText.innerText = explanation;
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizContainer.classList.add('hidden');
            progressBar.style.width = '100%';
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('fade-in');
            
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            if (percentage >= 80) message = "Xuất sắc! Bạn đã nắm rất vững kiến thức.";
            else if (percentage >= 50) message = "Khá tốt! Hãy ôn luyện thêm một chút nữa nhé.";
            else message = "Bạn cần cố gắng thêm nhiều. Đừng bỏ cuộc!";

            finalScore.innerHTML = `Bạn trả lời đúng <strong>${score}/${questions.length}</strong> câu.<br><span class="text-sm">${message}</span>`;
        }

        // Start the quiz
        window.onload = loadQuestion;

    </script>
