<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tập Chủ nghĩa xã hội khoa học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) { transform: translateX(5px); }
        .correct { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-2">
            <div id="progress-bar" class="bg-blue-600 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-6 md:p-8">
            <!-- Header Info -->
            <div class="flex justify-between items-center mb-6">
                <span class="text-sm font-semibold text-blue-600 uppercase tracking-wider">Môn học: CNXHKH</span>
                <span id="question-counter" class="text-sm text-gray-500 font-medium">Câu 1/50</span>
            </div>

            <!-- Question Area -->
            <div id="quiz-container">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-tight">
                    Đang tải câu hỏi...
                </h2>

                <div id="options-container" class="space-y-3">
                    <!-- Options will be injected here -->
                </div>

                <!-- Feedback Area -->
                <div id="feedback" class="mt-8 p-4 rounded-xl hidden">
                    <p id="feedback-text" class="font-bold"></p>
                    <p id="explanation-text" class="text-sm mt-2 opacity-90"></p>
                </div>

                <!-- Navigation -->
                <div class="mt-8 flex justify-end">
                    <button id="next-btn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors">
                        Câu tiếp theo →
                    </button>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="result-screen" class="hidden text-center py-10">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">Hoàn thành bài luyện tập!</h2>
                <p id="final-score" class="text-xl text-gray-600 mb-8"></p>
                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors">
                    Luyện tập lại
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [

    "options": [
      "Định luật vạn vật hấp dẫn của Newton.",

      "Định luật bảo toàn và chuyển hóa năng lượng.",
      "Định luật bảo toàn khối lượng của Lavoisier."
    ],
    "a": 2,
    "e": "Ba phát minh vĩ đại của khoa học tự nhiên thế kỷ XIX làm tiền đề cho Triết học Mác bao gồm: Định luật bảo toàn và chuyển hóa năng lượng, Thuyết tế bào và Thuyết tiến hóa của Darwin."

  {

    "e": "C. Mác là người đầu tiên đưa ra khái niệm và lý luận về 'Chuyên chính vô sản' trong các bức thư và tác phẩm kinh điển của mình để chỉ hình thái nhà nước thời kỳ quá độ."

  {

      "Nguồn gốc của gia đình, của chế độ tư hữu và của nhà nước",

    "a": 3,
    "e": "Tác phẩm 'Chống Đuyrinh' của Ph.Ăngghen được coi là tác phẩm bách khoa toàn thư, trình bày đầy đủ và hệ thống nhất cả Triết học, Kinh tế chính trị và Chủ nghĩa xã hội khoa học."
  },
  {

    "options": [

    ],
    "a": 0,
    "e": "Mác và Ăngghen đã kế thừa 'cái hạt nhân hợp lý' là phép biện chứng của Hêghen trên lập trường duy vật, cải tạo nó từ biện chứng duy tâm thành biện chứng duy vật."
  },
  {
    "q": "Khi hình thành Triết học Mác, C. Mác và Ph. Ăngghen đã kế thừa chủ nghĩa duy vật của ai và khắc phục tính siêu hình?",
    "options": [

    "a": 1,

  {

  {

  },
  {

      "4 kiểu nhà nước."
    ],
    "a": 2,
    "e": "Lịch sử loài người trước CNXH đã trải qua 3 hình thái kinh tế - xã hội có giai cấp đối kháng tương ứng với 3 kiểu nhà nước bóc lột: Nhà nước chủ nô, Nhà nước phong kiến, và Nhà nước tư sản."
  },
  {

      "Hoàn toàn không can thiệp, để thị trường tự do vận hành tự phát.",

  {

    "a": 1,
    "e": "Nền dân chủ xã hội chủ nghĩa được xây dựng trên cơ sở kinh tế là chế độ công hữu về các tư liệu sản xuất chủ yếu, hoàn toàn đối lập với tư hữu."

  {

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionCounter = document.getElementById('question-counter');
        const progressBar = document.getElementById('progress-bar');
        const nextBtn = document.getElementById('next-btn');
        const feedbackArea = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const explanationText = document.getElementById('explanation-text');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');

        function loadQuestion() {
            isAnswered = false;
            const currentQuestion = questions[currentQuestionIndex];
            
            // Update Progress
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            questionCounter.innerText = `Câu ${currentQuestionIndex + 1}/${questions.length}`;
            
            // Set Question Text
            questionText.innerText = currentQuestion.q;
            questionText.classList.remove('fade-in');
            void questionText.offsetWidth; // Trigger reflow
            questionText.classList.add('fade-in');

            // Clear and Load Options
            optionsContainer.innerHTML = '';
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 font-medium text-gray-700 hover:border-blue-400 hover:bg-blue-50 focus:outline-none';
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            // Reset UI
            feedbackArea.classList.add('hidden');
            nextBtn.classList.add('hidden');
        }

        function selectOption(index) {
            if (isAnswered) return;
            isAnswered = true;

            const currentQuestion = questions[currentQuestionIndex];
            const buttons = optionsContainer.getElementsByTagName('button');

            if (index === currentQuestion.a) {
                // Correct
                buttons[index].classList.add('correct');
                score++;
                showFeedback(true, currentQuestion.e);
            } else {
                // Wrong
                buttons[index].classList.add('wrong');
                buttons[currentQuestion.a].classList.add('correct'); // Highlight right answer
                showFeedback(false, currentQuestion.e);
            }

            // Disable all buttons
            for (let btn of buttons) {
                btn.disabled = true;
                if (!btn.classList.contains('correct') && !btn.classList.contains('wrong')) {
                    btn.classList.add('opacity-50');
                }
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function showFeedback(isCorrect, explanation) {
            feedbackArea.classList.remove('hidden');
            feedbackArea.classList.add('fade-in');
            
            if (isCorrect) {
                feedbackArea.className = 'mt-8 p-4 rounded-xl bg-green-100 text-green-800 border border-green-200 fade-in';
                feedbackText.innerText = 'Chính xác! 🌟';
            } else {
                feedbackArea.className = 'mt-8 p-4 rounded-xl bg-red-100 text-red-800 border border-red-200 fade-in';
                feedbackText.innerText = 'Rất tiếc, chưa đúng rồi...';
            }
            explanationText.innerText = explanation;
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizContainer.classList.add('hidden');
            progressBar.style.width = '100%';
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('fade-in');
            
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            if (percentage >= 80) message = "Xuất sắc! Bạn đã nắm rất vững kiến thức.";
            else if (percentage >= 50) message = "Khá tốt! Hãy ôn luyện thêm một chút nữa nhé.";
            else message = "Bạn cần cố gắng thêm nhiều. Đừng bỏ cuộc!";

            finalScore.innerHTML = `Bạn trả lời đúng <strong>${score}/${questions.length}</strong> câu.<br><span class="text-sm">${message}</span>`;
        }

        // Start the quiz
        window.onload = loadQuestion;

    </script>
